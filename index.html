<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MathSculpt — printable surfaces from formulas</title>
  </head>
  <body>
    <div id="app">
      <header id="topbar">
        <span id="brand">MathSculpt</span>
        <select id="presetSel"></select>
        <button id="saveBtn" class="tb-btn" title="Save current state as a user preset">Save</button>
        <button id="shareBtn" class="tb-btn" title="Copy share link">Share</button>
        <span class="tb-spacer"></span>
        <label id="heightLab">Height <input type="number" id="heightMm" min="5" max="400" step="1" value="120" /> mm</label>
        <button id="exportBtn" class="tb-btn primary">Export STL</button>
      </header>
      <div id="content">
        <aside id="panel">
          <section class="card">
            <h2>Shape</h2>
            <label class="row">
              <span>Profile</span>
              <select id="profile"></select>
            </label>
            <label class="row">
              <span>Mode</span>
              <select id="caps">
                <option value="both">Solid (closed)</option>
                <option value="bottom">Open top (hollow vase)</option>
              </select>
            </label>
            <label class="row" id="wallRow" hidden>
              <span>Wall, mm</span>
              <input type="range" id="wallMm" min="0" max="8" step="0.2" value="2" />
              <output id="wallVal"></output>
            </label>
            <label class="row">
              <span>Full res</span>
              <select id="resolution">
                <option value="192">192 × 192</option>
                <option value="256" selected>256 × 256</option>
                <option value="384">384 × 384</option>
                <option value="512">512 × 512</option>
              </select>
            </label>
            <canvas id="profileGraph"></canvas>
          </section>
          <div id="fourierWrap"></div>
          <h3 class="group-title">Displacements</h3>
          <div id="displaceCards"></div>
          <h3 class="group-title">Deformers</h3>
          <div id="deformCards"></div>
          <h3 class="group-title mod-toggle" id="modToggle">Modulation <span id="modCaret">▸</span></h3>
          <div id="modWrap" hidden></div>
          <p id="status"></p>
          <p id="warnings"></p>
        </aside>
        <main id="viewWrap">
          <canvas id="view"></canvas>
          <div id="progressWrap" hidden>
            <div id="progressBar"><div id="progressFill"></div></div>
            <span id="progressLabel"></span>
          </div>
        </main>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
